<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>联系客服 - TH2.VIP</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#c2dbe3;color:#31465a;font-family:Inter,Poppins,Arial,'Microsoft YaHei',sans-serif}a{text-decoration:none;color:inherit}.support-shell{min-height:100vh;background:radial-gradient(circle at 14% 0%,rgba(255,255,255,.88),transparent 24%),radial-gradient(circle at 86% 10%,rgba(255,235,148,.52),transparent 26%),linear-gradient(180deg,#cde6ee 0%,#e9f6f9 46%,#ffffff 100%);padding:22px}.support-wrap{max-width:920px;margin:0 auto}.support-top{height:66px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand strong{display:block;font-size:30px;color:#d88c19;font-weight:900}.brand span{display:block;margin-top:-4px;font-size:10px;letter-spacing:4px;color:#8da0ad}.home-link{height:40px;border-radius:999px;padding:0 16px;display:inline-flex;align-items:center;background:#fff;color:#4f687b;font-weight:900;border:1px solid rgba(255,255,255,.86);box-shadow:0 8px 18px rgba(80,130,158,.13)}.hero{margin:14px 0 18px;border-radius:22px;padding:26px;background:radial-gradient(circle at 78% 36%,rgba(255,230,112,.86),transparent 24%),linear-gradient(135deg,#bfe8f6 0%,#f0fbff 48%,#ffe8a4 100%);box-shadow:0 16px 34px rgba(82,132,158,.16);border:1px solid rgba(255,255,255,.86)}.hero h1{margin:0 0 8px;font-size:34px;color:#263f55}.hero p{margin:0;color:#5d788a;font-weight:800}.panel{border-radius:22px;background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.86);box-shadow:0 16px 34px rgba(82,132,158,.16);overflow:hidden}.tabs{display:flex;border-bottom:1px solid #d8edf8;background:#f8fcff}.tab{flex:1;height:54px;border:0;background:transparent;color:#6a8193;font-weight:900;cursor:pointer}.tab.active{background:#fff4d1;color:#cf8b15}.content{padding:22px}.state{min-height:160px;display:grid;place-items:center;color:#6b8293;font-weight:900;text-align:center}.ticket-list{display:grid;gap:12px}.ticket{border:1px solid #d8edf8;background:#fff;border-radius:16px;padding:14px;display:grid;gap:8px;text-align:left}.ticket[role=button]{cursor:pointer}.ticket:hover{border-color:#f1c76a;box-shadow:0 10px 20px rgba(183,116,31,.12)}.ticket-head{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:#30465b}.ticket small{color:#8297a8;font-weight:800}.ticket p{margin:0;color:#597083}.detail{margin-top:16px;border:1px solid #d8edf8;background:#fff;border-radius:18px;padding:16px;display:grid;gap:12px}.detail[hidden]{display:none}.reply-list{display:grid;gap:10px}.reply{padding:12px;border-radius:14px;background:#f5fbff;border:1px solid #d8edf8}.reply.admin{background:#fff7dc;border-color:#f1d481}.detail-actions{display:flex;gap:10px;flex-wrap:wrap}.secondary{height:42px;border:1px solid #cfe6f4;border-radius:999px;background:#fff;color:#435b70;font-weight:900;padding:0 16px;cursor:pointer}.form{display:grid;gap:12px}.field{display:grid;gap:6px}.field label{font-weight:900;color:#435b70}.field input,.field textarea{width:100%;border:1px solid #cfe6f4;border-radius:14px;padding:12px 14px;background:#fff;color:#30465b;font:inherit;font-weight:700}.field textarea{min-height:140px;resize:vertical}.primary{height:46px;border:0;border-radius:999px;background:linear-gradient(180deg,#fff0b2,#f0c45b 48%,#bc792c);color:#573508;font-weight:1000;cursor:pointer;box-shadow:0 10px 20px rgba(183,116,31,.22)}.hint{color:#7b91a2;font-weight:800;line-height:1.6}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);max-width:min(420px,calc(100vw - 32px));padding:12px 16px;border-radius:14px;background:#263a50;color:#fff;font-weight:900;box-shadow:0 12px 28px rgba(20,40,56,.24);z-index:20}@media(max-width:640px){.support-shell{padding:14px}.support-top{height:58px}.brand strong{font-size:26px}.hero{padding:20px}.hero h1{font-size:28px}.content{padding:16px}.ticket-head{display:grid}.tab{font-size:13px}}
  </style>
</head>
<body>
  <main class="support-shell">
    <div class="support-wrap">
      <header class="support-top"><a class="brand" href="/"><strong>TH2.VIP</strong><span>在线游戏</span></a><a class="home-link" href="/">返回首页</a></header>
      <section class="hero"><h1>联系客服</h1><p>提交问题或查看工单，客服会在工单记录中回复你。</p></section>
      <section class="panel"><div class="tabs"><button class="tab active" type="button" data-tab="new">新建工单</button><button class="tab" type="button" data-tab="list">我的工单</button></div><div class="content" data-view="new"><form class="form" data-ticket-form><div class="field"><label for="title">标题</label><input id="title" name="title" maxlength="120" required placeholder="请输入标题"></div><div class="field"><label for="content">内容</label><textarea id="content" name="content" required placeholder="请描述你的问题"></textarea></div><button class="primary" type="submit">提交工单</button><p class="hint">请先登录后创建或查看客服工单。</p></form></div><div class="content" data-view="list" hidden><div class="state" data-ticket-state>正在加载...</div><div class="ticket-list" data-ticket-list></div><section class="detail" data-ticket-detail hidden></section></div></section>
    </div>
  </main>
  <script>
    (function(){'use strict';var tabs=document.querySelectorAll('[data-tab]');var views=document.querySelectorAll('[data-view]');var form=document.querySelector('[data-ticket-form]');var list=document.querySelector('[data-ticket-list]');var state=document.querySelector('[data-ticket-state]');var detail=document.querySelector('[data-ticket-detail]');function token(){var keys=['api_token','token','Authorization','userToken','member_token','th2w:api_token'];for(var i=0;i<keys.length;i+=1){var v=localStorage.getItem(keys[i])||sessionStorage.getItem(keys[i]);if(v){return String(v).replace(/^Bearer\s+/i,'').trim();}}return '';}function requireLogin(){var t=token();if(!t){location.href=(window.innerWidth<=640?'/new-h5/#/login?redirect=':'/login?redirect=')+encodeURIComponent(location.pathname+location.search);}return t;}function headers(t){return {'Content-Type':'application/json','Authorization':'Bearer '+t};}function toast(message){var node=document.createElement('div');node.className='toast';node.textContent=message;document.body.appendChild(node);setTimeout(function(){node.remove();},2600);}function show(name){tabs.forEach(function(tab){tab.classList.toggle('active',tab.dataset.tab===name);});views.forEach(function(view){view.hidden=view.dataset.view!==name;});if(name==='list'){loadTickets();}}tabs.forEach(function(tab){tab.addEventListener('click',function(){show(tab.dataset.tab);});});form.addEventListener('submit',function(event){event.preventDefault();var t=requireLogin();if(!t){return;}var data={title:form.title.value.trim(),content:form.content.value.trim()};if(!data.title||!data.content){toast('请完整填写信息');return;}fetch('/api/work-orders/create',{method:'POST',headers:headers(t),body:JSON.stringify(data)}).then(function(r){return r.json();}).then(function(payload){if(Number(payload.code)===200){form.reset();toast('工单已提交');show('list');renderDetail(payload.data||{});}else{toast(payload.message||'提交失败');}}).catch(function(){toast('提交失败');});});function loadTickets(){var t=requireLogin();if(!t){return;}state.hidden=false;state.textContent='正在加载...';list.innerHTML='';hideDetail();fetch('/api/work-orders/list',{headers:{'Authorization':'Bearer '+t}}).then(function(r){return r.json();}).then(function(payload){var data=payload.data&&payload.data.data?payload.data.data:(Array.isArray(payload.data)?payload.data:[]);if(!data.length){state.hidden=false;state.textContent='暂无工单';return;}state.hidden=true;list.innerHTML=data.map(function(item){return '<article class="ticket" role="button" tabindex="0" data-ticket-id="'+esc(item.id)+'"><div class="ticket-head"><span>'+esc(item.title||'工单')+'</span><small>'+esc(item.created_at||'')+'</small></div><p>'+esc(item.content||item.message||'')+'</p><small>状态：'+esc(statusText(item.status||item.state))+'</small></article>';}).join('');Array.prototype.forEach.call(list.querySelectorAll('[data-ticket-id]'),function(card){card.addEventListener('click',function(){loadDetail(card.getAttribute('data-ticket-id'));});card.addEventListener('keydown',function(e){if(e.key==='Enter'){loadDetail(card.getAttribute('data-ticket-id'));}});});}).catch(function(){state.hidden=false;state.textContent='加载工单失败';});}function loadDetail(id){var t=requireLogin();if(!t||!id){return;}detail.hidden=false;detail.innerHTML='<strong>正在加载工单详情...</strong>';fetch('/api/work-orders/'+encodeURIComponent(id),{headers:{'Authorization':'Bearer '+t}}).then(function(r){return r.json();}).then(function(payload){if(Number(payload.code)===200){renderDetail(payload.data||{});}else{detail.innerHTML='<strong>工单详情加载失败</strong>';}}).catch(function(){detail.innerHTML='<strong>工单详情加载失败</strong>';});}function renderDetail(item){if(!item||!item.id){return;}var replies=Array.isArray(item.replies)?item.replies:[];detail.hidden=false;detail.innerHTML='<div class="ticket-head"><strong>'+esc(item.title||'工单')+'</strong><small>'+esc(item.order_no||item.orderNo||'')+'</small></div><p>'+esc(item.content||'')+'</p><small>状态：'+esc(statusText(item.status||item.state))+' · '+esc(item.created_at||'')+'</small>'+(item.admin_reply?'<div class="reply admin"><strong>客服回复</strong><p>'+esc(item.admin_reply)+'</p><small>'+esc(item.admin_reply_time||'')+'</small></div>':'')+'<div class="reply-list">'+replies.map(function(reply){return '<div class="reply '+(reply.is_admin||reply.type==='admin'?'admin':'')+'"><strong>'+(reply.is_admin||reply.type==='admin'?'客服':'我')+'</strong><p>'+esc(reply.content||'')+'</p><small>'+esc(reply.created_at||'')+'</small></div>';}).join('')+'</div><form class="form" data-reply-form><div class="field"><label>继续回复</label><textarea name="content" placeholder="补充你的问题"></textarea></div><div class="detail-actions"><button class="primary" type="submit">提交回复</button><button class="secondary" type="button" data-close-ticket>关闭工单</button></div></form>';var replyForm=detail.querySelector('[data-reply-form]');replyForm.addEventListener('submit',function(event){event.preventDefault();replyTicket(item.id,replyForm.content.value);});var closeBtn=detail.querySelector('[data-close-ticket]');closeBtn.addEventListener('click',function(){closeTicket(item.id);});}function replyTicket(id,content){var t=requireLogin();content=String(content||'').trim();if(!content){toast('请输入回复内容');return;}fetch('/api/work-orders/'+encodeURIComponent(id)+'/reply',{method:'POST',headers:headers(t),body:JSON.stringify({content:content})}).then(function(r){return r.json();}).then(function(payload){if(Number(payload.code)===200){toast('回复已提交');renderDetail(payload.data||{});loadTickets();}else{toast(payload.message||'回复失败');}}).catch(function(){toast('回复失败');});}function closeTicket(id){var t=requireLogin();fetch('/api/work-orders/'+encodeURIComponent(id)+'/close',{method:'POST',headers:headers(t),body:JSON.stringify({})}).then(function(r){return r.json();}).then(function(payload){if(Number(payload.code)===200){toast('工单已关闭');renderDetail(payload.data||{});loadTickets();}else{toast(payload.message||'关闭失败');}}).catch(function(){toast('关闭失败');});}function hideDetail(){if(detail){detail.hidden=true;detail.innerHTML='';}}function statusText(value){var map={open:'处理中',pending:'待处理',replied:'已回复',closed:'已关闭'};return map[value]||value||'处理中';}function esc(value){return String(value==null?'':value).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}}());
  </script>
</body>
</html>
